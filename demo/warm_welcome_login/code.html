<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>温馨登录界面</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&amp;family=Noto+Serif+SC:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        // Cream background
                        "cream": "#FFFDF5",
                        // Warm terracotta for primary actions
                        "terracotta": "#E07A5F", 
                        "terracotta-dark": "#D0654B",
                        // Pale peach for borders
                        "peach": "#F4D1C6", 
                        // Text colors
                        "warm-gray": "#4A403A",
                        "soft-gray": "#8C817D",
                        "background-dark": "#2C2420", // Dark mode warm dark
                    },
                    fontFamily: {
                        "sans": ["Nunito", "system-ui", "sans-serif"],
                        "serif": ["Noto Serif SC", "serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            min-height: max(800px, 100dvh);background-color: #FFFDF5; 
        }::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-cream dark:bg-background-dark font-sans antialiased min-h-screen flex flex-col items-center justify-center p-6 text-warm-gray dark:text-slate-100 selection:bg-peach selection:text-terracotta">
<div class="w-full max-w-[400px] flex flex-col gap-6">
<div class="flex flex-col items-center text-center space-y-4 pt-10">
<div class="w-24 h-24 bg-terracotta/10 dark:bg-terracotta/20 rounded-[2rem] flex items-center justify-center mb-2 text-terracotta transform rotate-3 hover:rotate-6 transition-transform duration-300">
<span class="material-symbols-outlined text-5xl">cottage</span>
</div>
<div class="space-y-1">
<h1 class="text-3xl font-extrabold tracking-tight text-warm-gray dark:text-slate-50 font-sans">
                欢迎回来
            </h1>
<p class="text-soft-gray dark:text-slate-400 text-base font-medium">
                登录以发现理想温馨好房
            </p>
</div>
</div>
<form class="flex flex-col gap-5 w-full mt-6" onsubmit="event.preventDefault();">
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-6 pointer-events-none text-terracotta/50 group-focus-within:text-terracotta transition-colors">
<span class="material-symbols-outlined">person</span>
</div>
<input class="block w-full h-14 pl-14 pr-6 rounded-full bg-white dark:bg-white/5 border-2 border-peach focus:border-terracotta focus:ring-0 text-base placeholder-soft-gray/70 dark:placeholder-slate-500 transition-all duration-300 outline-none shadow-[0_2px_10px_-4px_rgba(224,122,95,0.1)] focus:shadow-[0_4px_16px_-4px_rgba(224,122,95,0.2)] text-warm-gray dark:text-white" placeholder="手机号 / 邮箱" type="text"/>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-6 pointer-events-none text-terracotta/50 group-focus-within:text-terracotta transition-colors">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="block w-full h-14 pl-14 pr-14 rounded-full bg-white dark:bg-white/5 border-2 border-peach focus:border-terracotta focus:ring-0 text-base placeholder-soft-gray/70 dark:placeholder-slate-500 transition-all duration-300 outline-none shadow-[0_2px_10px_-4px_rgba(224,122,95,0.1)] focus:shadow-[0_4px_16px_-4px_rgba(224,122,95,0.2)] text-warm-gray dark:text-white" placeholder="密码" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-5 text-soft-gray hover:text-terracotta transition-colors cursor-pointer focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
<div class="flex justify-end px-4 -mt-1">
<a class="text-terracotta text-sm font-semibold hover:text-terracotta-dark transition-colors" href="#">
                忘记密码？
            </a>
</div>
<button class="w-full h-14 mt-4 rounded-full bg-terracotta text-white text-lg font-bold shadow-lg shadow-terracotta/30 hover:shadow-xl hover:shadow-terracotta/40 hover:bg-terracotta-dark active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-2 group">
<span>登录</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<div class="relative py-6">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-peach/60 dark:border-slate-700"></div>
</div>
<div class="relative flex justify-center text-xs font-medium uppercase tracking-wider">
<span class="bg-cream dark:bg-background-dark px-4 text-soft-gray">
                其他方式登录
            </span>
</div>
</div>
<div class="flex justify-center gap-8 pb-4">
<button aria-label="WeChat Login" class="w-12 h-12 rounded-full bg-white dark:bg-white/5 border-2 border-peach/50 dark:border-slate-700 hover:border-green-500 hover:bg-green-50 flex items-center justify-center transition-all duration-300 shadow-sm hover:shadow-green-100 hover:-translate-y-1 group">
<svg class="w-6 h-6 text-soft-gray group-hover:text-green-600 fill-current transition-colors" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8.5,13.5A1.5,1.5 0 1,1 10,12A1.5,1.5 0 0,1 8.5,13.5M14.5,13.5A1.5,1.5 0 1,1 16,12A1.5,1.5 0 0,1 14.5,13.5M12,2C6.48,2 2,5.92 2,10.5C2,13.23 3.56,15.65 6,17.18V21.5L9.67,18.84C10.42,18.95 11.2,19 12,19C17.52,19 22,15.08 22,10.5C22,5.92 17.52,2 12,2Z"></path>
</svg>
</button>
<button aria-label="Apple Login" class="w-12 h-12 rounded-full bg-white dark:bg-white/5 border-2 border-peach/50 dark:border-slate-700 hover:border-slate-800 hover:bg-slate-50 flex items-center justify-center transition-all duration-300 shadow-sm hover:shadow-slate-100 hover:-translate-y-1 group">
<span class="material-symbols-outlined text-soft-gray group-hover:text-slate-900 text-2xl">pest_control</span>
</button>
<button aria-label="More Options" class="w-12 h-12 rounded-full bg-white dark:bg-white/5 border-2 border-peach/50 dark:border-slate-700 hover:border-terracotta hover:bg-terracotta/5 flex items-center justify-center transition-all duration-300 shadow-sm hover:shadow-terracotta/20 hover:-translate-y-1 group">
<span class="material-symbols-outlined text-soft-gray group-hover:text-terracotta text-2xl">more_horiz</span>
</button>
</div>
<div class="mt-auto pb-4 text-center">
<p class="text-sm text-soft-gray dark:text-slate-400">
            还没有账号？ 
            <a class="font-bold text-terracotta hover:text-terracotta-dark transition-colors underline decoration-2 decoration-transparent hover:decoration-terracotta/30" href="#">
                立即注册
            </a>
</p>
</div>
</div>

</body></html>
