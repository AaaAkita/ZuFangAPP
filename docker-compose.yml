version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: zufang_backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./backend/logs:/usr/src/app/logs
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - zufang_net

  frontend:
    build:
      context: ./frontend
    container_name: zufang_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - zufang_net

  postgres:
    image: postgres:15-alpine
    container_name: zufang_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zufang_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - zufang_net

  redis:
    image: redis:7-alpine
    container_name: zufang_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - zufang_net

volumes:
  postgres_data:
  redis_data:


networks:
  zufang_net:
    driver: bridge
