services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: zufang_backend_dev
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/zufang_dev?schema=public
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_EXPIRES_IN=7d
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./backend/src:/usr/src/app/src
      - ./backend/prisma:/usr/src/app/prisma
      - ./backend/package.json:/usr/src/app/package.json
      - ./backend/tsconfig.json:/usr/src/app/tsconfig.json
      - ./backend/tsconfig.build.json:/usr/src/app/tsconfig.build.json
      - ./backend/nest-cli.json:/usr/src/app/nest-cli.json
      - ./backend/prisma.config.ts:/usr/src/app/prisma.config.ts
      - backend_node_modules:/usr/src/app/node_modules
    ports:
      - "3026:3000"
      - "9229:9229"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - zufang_net
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend_uniapp
      dockerfile: Dockerfile.dev
    container_name: zufang_frontend_dev
    environment:
      - NODE_ENV=development
      - SKIP_MIRROR_CHECK=true
    volumes:
      - ./frontend_uniapp/src:/app/src
      - ./frontend_uniapp/index.html:/app/index.html
      - ./frontend_uniapp/package.json:/app/package.json
      - ./frontend_uniapp/tsconfig.json:/app/tsconfig.json
      - ./frontend_uniapp/vite.config.ts:/app/vite.config.ts
      - frontend_node_modules:/app/node_modules
    ports:
      - "5179:5173"
    depends_on:
      - backend
    networks:
      - zufang_net
    command: npm run dev:h5 -- --host

  postgres:
    image: postgres:15-alpine
    container_name: zufang_postgres_dev
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zufang_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - zufang_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zufang_redis_dev
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - zufang_net

volumes:
  postgres_dev_data:
  redis_dev_data:
  backend_node_modules:
  frontend_node_modules:


networks:
  zufang_net:
    driver: bridge
