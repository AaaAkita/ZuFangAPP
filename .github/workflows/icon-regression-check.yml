name: Icon Regression Check

on:
  push:
    paths:
      - "frontend_uniapp/src/**"
      - "frontend_uniapp/scripts/**"
      - "frontend_uniapp/package.json"
      - "frontend_uniapp/package-lock.json"
      - ".github/workflows/icon-regression-check.yml"
  pull_request:
    paths:
      - "frontend_uniapp/src/**"
      - "frontend_uniapp/scripts/**"
      - "frontend_uniapp/package.json"
      - "frontend_uniapp/package-lock.json"
      - ".github/workflows/icon-regression-check.yml"

jobs:
  check-icons:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_uniapp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend_uniapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run icon regression check
        run: npm run check:icons

