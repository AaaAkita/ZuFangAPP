server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Static Assets (Max cache)
    location ~* \.(js|css|woff2?|svg|png|jpg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API Proxy to Backend Container
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Keep timeouts large for big uploads if any happen in the future
        proxy_read_timeout    360s;
        proxy_send_timeout    360s;
        client_body_timeout   360s;

        # Disable buffering for reliable large streams
        proxy_buffering         off;
        proxy_request_buffering off;
    }

    # SPA Fallback (Required for React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Allowed body size (e.g. for image uploads)
    client_max_body_size 50m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
