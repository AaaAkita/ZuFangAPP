<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>租房避雷APP</title>
  <!-- 引入 Stitch 设计稿所需的字体及图标 -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#f28c4b", // Soft orange
            "primary-hover": "#df7837",
            "secondary": "#a87b5d", // Warm earthy tone
            "background-light": "#fefaf6", // Warm cream
            "background-dark": "#2c1e16",
            "surface-light": "#ffffff",
            "surface-dark": "#3d2a1f",
            "text-main": "#2c1e16",
            "text-muted": "#8a634c",
            "border-color": "#f7ede4",
          },
          fontFamily: {
            "display": ["Noto Sans SC", "Plus Jakarta Sans", "sans-serif"],
            "body": ["Noto Sans SC", "Plus Jakarta Sans", "sans-serif"],
          },
          borderRadius: {
            "DEFAULT": "1.5rem", // Very rounded
            "lg": "2rem",
            "xl": "2.5rem",
            "2xl": "3rem",
            "3xl": "4rem",
            "full": "9999px",
          },
          boxShadow: {
            "soft": "0 8px 30px -4px rgba(44, 30, 22, 0.06)",
            "card": "0 4px 12px rgba(44, 30, 22, 0.04), 0 8px 24px rgba(44, 30, 22, 0.04)",
          }
        },
      },
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
